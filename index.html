  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,255,255,.07)}\n  .contact-ic{width:42px;height:42px;flex:none;border-radius:11px;background:rgba(100,160,200,.12);display:grid;place-items:center;color:var(--teal-bright)}\n  .contact-ic svg{width:18px;height:18px}\n  .contact-lab{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--muted-d);margin-bottom:2px}\n  .contact-val{color:#fff;font-weight:600;font-size:15px;word-break:break-word}\n\n  /* ---------- TEAM ---------- */\n  .team{background:var(--white)}\n  .team-h2{font-family:'Crimson Text',Georgia,serif;font-weight:600;font-size:clamp(34px,4.6vw,52px);letter-spacing:-.01em}\n  .team .sec-head p{max-width:58ch}\n  .team .sec-head strong{color:var(--ink);font-weight:700}\n  .savas-letters{display:flex;justify-content:center;gap:clamp(6px,1.4vw,18px);margin:10px 0 40px;flex-wrap:nowrap}\n  .sl{font-family:var(--font-display);font-weight:800;font-size:clamp(40px,6vw,80px);line-height:1;letter-spacing:.05em;color:var(--teal-bright)}\n  .sl.muted{color:#D8D2C6}\n  .team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}\n  .team-card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:34px 24px;text-align:center;transition:transform .18s, box-shadow .2s}\n  .team-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}\n  .team-letter{width:76px;height:76px;border-radius:18px;margin:0 auto 18px;background:rgba(100,160,200,.10);color:var(--teal-bright);display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:40px;line-height:1}\n  .team-card h3{font-family:'Crimson Text',Georgia,serif;font-size:19px;font-weight:600;color:var(--ink);margin-bottom:6px;letter-spacing:0;line-height:1.2}\n  .role{color:var(--teal-bright);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-mono)}\n\n  /* ---------- RESPONSIVE ---------- */\n  @media(max-width:980px){\n    .hero-grid{grid-template-colu n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TRUST -->\n<div class=\"trust\">\n  <div class=\"wrap trust-inner\">\n    <span class=\"trust-label\">Sell everywhere your guests book<\u002Fspan>\n    <div class=\"chips\">\n      <b>Booking.com<\u002Fb><b>Agoda<\u002Fb><b>MakeMyTrip<\u002Fb><b>Goibibo<\u002Fb><b>Expedia<\u002Fb><b>Airbnb<\u002Fb><b>Your own website<\u002Fb>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PROBLEM → ONE SYSTEM -->\n<section class=\"shift\" id=\"platform\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">The Savas difference<\u002Fspan>\n      <h2>Stop running your business across six disconnected tools.<\u002Fh2>\n      <p>Most travel and hospitality businesses stitch together a front desk system, a separate channel manager, a till that doesn't talk to anything, and spreadsheets for agents. Every gap is a double booking, a parity error, or a night spent reconciling. Savas replaces the patchwork with one connected system — from inventory to invoice.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"shift-grid\">\n      <div class=\"panel before reveal\">\n        <span class=\"tag\">Today · The patchwork<\u002Fspan>\n        <h3>Six tools, none in sync<\u002Fh3>\n        <ul>\n          <li><span class=\"mk\">×<\u002Fspan> Bookings land on one screen, inventory lives on another<\u002Fli>\n          <li><span class=\"mk\">×<\u002Fspan> Restaurant and room charges rekeyed by hand at checkout<\u002Fli>\n          <li><span class=\"mk\">×<\u002Fspan> OTA rates updated manually — parity errors and oversells<\u002Fli>\n          <li><span class=\"mk\">×<\u002Fspan> Agent commissions tracked in spreadsheets<\u002Fli>\n          <li><span class=\"mk\">×<\u002Fspan> No single view of what the business actually earned<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"panel after reveal\">\n        <span class=\"tag\">With Savas · One system<\u002Fspan>\n        <h3>One live source of truth<\u002Fh3>\n        <ul>\n          <li><span class=\"mk\">✓<\u002Fspan> Rooms, rates and availability shared across every channel<\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan> Every outlet charge posts straight to the guest folio<\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan> Rates push to all OTAs in real time — no oversell, no rekeying<\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan> Agent markups, wallets and commissions handled automatically<\u002Fli>\n          <li><span class=\"mk\">✓<\u002Fspan> Live numbers across property, outlets and agents in one place<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MODULES -->\n<section class=\"modules\" id=\"modules\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">The platform · five modules, one core<\u002Fspan>\n      <h2>Everything it takes to sell, serve and scale travel.<\u002Fh2>\n      <p>Each module is powerful on its own and unbeatable together — because they share one live database. Turn on what you need today, switch on the rest as you grow.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- PMS -->\n    <div class=\"mod reveal\">\n      <div class=\"mod-left\">\n        <div class=\"mod-ic\"><svg viewBox=\"0 0 24 24\"><path d=\"M3 21V9l9-6 9 6v12\"><\u002Fpath><path d=\"M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"mod-cat\">Property<\u002Fdiv>\n        <h3>Property Management<\u002Fh3>\n        <p class=\"lead\">Run the front desk, not the firefighting — your whole property in one real-time view.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"feat-card\"><h4>Front desk &amp; reservations<\u002Fh4><p>Bookings, check-in and check-out, room assignment and a live availability calendar across every room type.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Rates &amp; inventory<\u002Fh4><p>Set rates, restrictions and stop-sells once — every channel updates the moment a room is booked.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Guest profiles<\u002Fh4><p>One unified profile with stay history, preferences and spend, so every guest is recognised on arrival.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Housekeeping<\u002Fh4><p>Live room status and task assignment that keeps the front desk and floor in step automatically.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Billing &amp; GST folios<\u002Fh4><p>Tax-compliant folios and invoices generated on the spot, with charges from every outlet rolled in.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Multi-property control<\u002Fh4><p>Run several properties from one login with role-based access and reporting that rolls up across all of them.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- POS -->\n    <div class=\"mod reveal\">\n      <div class=\"mod-left\">\n        <div class=\"mod-ic\"><svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M7 21h10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"mod-cat\">Sales<\u002Fdiv>\n        <h3>Point of Sale<\u002Fh3>\n        <p class=\"lead\">Capture every rupee across every outlet — and post it straight to the room.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"feat-card\"><h4>Every outlet, one system<\u002Fh4><p>Restaurant, bar, café, pool, spa, room service and retail run on a single POS with outlet-wise reporting.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Charge to room<\u002Fh4><p>Post a check to the guest folio in real time — no slips, no rekeying, no surprises at checkout.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Tableside &amp; mobile ordering<\u002Fh4><p>Take orders from a phone or tablet anywhere on the property and fire them straight to the kitchen display.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Menu &amp; table management<\u002Fh4><p>Build menus, modifiers and floor plans; split, merge and transfer checks in a tap.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Live stock control<\u002Fh4><p>Track ingredients and retail stock as you sell, with low-stock alerts before you run out.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Flexible payments<\u002Fh4><p>Cards, UPI, wallets and split tender with pre-authorisation — every transaction reconciled automatically.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CHANNEL MANAGER -->\n    <div class=\"mod reveal\">\n      <div class=\"mod-left\">\n        <div class=\"mod-ic\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"mod-cat\">Distribution<\u002Fdiv>\n        <h3>Channel Manager<\u002Fh3>\n        <p class=\"lead\">Sell everywhere. Oversell nowhere. Rates and availability synced in real time.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"feat-card\"><h4>Two-way real-time sync<\u002Fh4><p>Push rates and inventory to every OTA and pull bookings back the instant they happen.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>No more overbooking<\u002Fh4><p>One booking on any channel updates availability everywhere at once — the calendar is never wrong.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Automatic rate parity<\u002Fh4><p>Hold consistent pricing across channels and adjust everywhere from a single screen.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Direct booking engine<\u002Fh4><p>A commission-free booking engine for your own website and social — keep more of every sale.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>All the channels you sell on<\u002Fh4><p>Booking.com, Agoda, MakeMyTrip, Goibibo, Expedia, Airbnb and more from one connection.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Rules &amp; restrictions<\u002Fh4><p>Minimum stays, stop-sells and channel-specific pricing managed centrally, applied instantly.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- AGENT MANAGEMENT -->\n    <div class=\"mod reveal\">\n      <div class=\"mod-left\">\n        <div class=\"mod-ic\"><svg viewBox=\"0 0 24 24\"><circle cx=\"9\" cy=\"8\" r=\"3.2\"><\u002Fcircle><path d=\"M3.5 20c0-3.3 2.5-5.5 5.5-5.5s5.5 2.2 5.5 5.5\"><\u002Fpath><circle cx=\"17.5\" cy=\"9\" r=\"2.4\"><\u002Fcircle><path d=\"M16 14.4c2.6.2 4.5 2.2 4.5 5.1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"mod-cat\">Network<\u002Fdiv>\n        <h3>Agent Management<\u002Fh3>\n        <p class=\"lead\">Turn your sub-agent network into a growth engine — with full control of margins.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"feat-card\"><h4>Onboard in minutes<\u002Fh4><p>Create unlimited sub-agents and multi-level hierarchies with role-based access and permissions.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Markup &amp; commission control<\u002Fh4><p>Set markups, margins and commissions by agent tier, region or product — and protect what they see.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Wallets &amp; credit limits<\u002Fh4><p>Top-ups, credit lines and automated reconciliation, so every agent settles cleanly.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>White-label portal<\u002Fh4><p>Agents book under your brand on your domain — they see your name, never ours.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Bookings to vouchers<\u002Fh4><p>Search, book, issue vouchers and e-tickets, and handle cancellations from one dashboard.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Agent-wise reporting<\u002Fh4><p>Track sales, ledgers and performance per agent with full audit logs on every markup change.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MOBILE -->\n    <div class=\"mod reveal\">\n      <div class=\"mod-left\">\n        <div class=\"mod-ic\"><svg viewBox=\"0 0 24 24\"><rect x=\"6.5\" y=\"2.5\" width=\"11\" height=\"19\" rx=\"2.5\"><\u002Frect><path d=\"M10.5 18.5h3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"mod-cat\">Mobile<\u002Fdiv>\n        <h3>Mobile App<\u002Fh3>\n        <p class=\"lead\">Your whole business in your pocket — for agents, managers and guests.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"feat-card\"><h4>Book on the go<\u002Fh4><p>Search, book and confirm from anywhere — agents close sales in the field, not just at a desk.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Live manager view<\u002Fh4><p>Occupancy, sales and ledgers in real time, so you run the property without opening a laptop.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Guest app<\u002Fh4><p>Digital check-in, room-service ordering and in-stay requests that lighten the front desk.<\u002Fp><\u002Fdiv>\n        <div class=\"feat-card\"><h4>Synced with web<\u002Fh4><p>Whatever happens on mobile is true on the desktop the same second — one system, two screens.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY -->\n<section class=\"why\" id=\"why\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow on-dark\">Why teams choose Savas<\u002Fspan>\n      <h2>Built to connect, built for India, built to go live fast.<\u002Fh2>\n      <p>The reason an integrated platform wins isn't a longer feature list — it's that the numbers simply reconcile by default.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"why-grid\">\n      <div class=\"why-card reveal\"><h3>One connected system<\u002Fh3><p>Property, outlets, distribution and agents share a single live database. No exports, no rekeying, no end-of-day reconciliation marathons — the figures match because they're the same figures.<\u002Fp><\u002Fdiv>\n      <div class=\"why-card reveal\"><h3>Made for the Indian market<\u002Fh3><p>GST-ready billing, UPI and local payment rails, and native connections to the OTAs your guests and agents actually use — not a Western platform bolted on.<\u002Fp><\u002Fdiv>\n      <div class=\"why-card reveal\"><h3>Live in days, not quarters<\u002Fh3><p>Pre-integrated inventory and guided onboarding get you selling fast. Switch modules on as you grow — no painful re-platforming later.<\u002Fp><\u002Fdiv>\n      <div class=\"why-card reveal\"><h3>Web and mobile, fully synced<\u002Fh3><p>Every role gets the right surface — front desk on the desktop, agents and managers on mobile — all reading and writing to the same source of truth.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHO -->\n<section class=\"who\" id=\"who\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">Who it's for<\u002Fspan>\n      <h2>One platform, three ways to grow.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"who-grid\">\n      <div class=\"who-card reveal\">\n        <span class=\"badge\">Properties<\u002Fspan>\n        <h3>Hotels, homestays &amp; resorts<\u002Fh3>\n        <p>Take direct control of distribution and on-property revenue.<\u002Fp>\n        <ul><li>Front desk, housekeeping &amp; folios<\u002Fli><li>Outlet POS posting to the room<\u002Fli><li>Real-time OTA sync, zero oversell<\u002Fli><li>Commission-free direct bookings<\u002Fli><\u002Ful>\n      <\u002Fdiv>\n      <div class=\"who-card reveal\">\n        <span class=\"badge\">Agencies<\u002Fspan>\n        <h3>Travel agencies &amp; tour operators<\u002Fh3>\n        <p>Run a clean, profitable sub-agent network at scale.<\u002Fp>\n        <ul><li>Onboard unlimited sub-agents<\u002Fli><li>Tiered markups &amp; commissio
