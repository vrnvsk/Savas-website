document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er=\"{{ contactCardHover }}\">\n            <span style=\"{{ contactIconStyle }}\">☎<\u002Fspan>\n            <span><span style=\"display:block; font-family:'Space Mono',monospace; font-size:11px; color:#9aa3b2;\">Call us<\u002Fspan><span style=\"color:#fff; font-weight:600; font-size:15px;\">+91 97892 54814<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n          <a href=\"mailto:rspmenon@gmail.com\" style=\"{{ contactCardStyle }}\" style-hover=\"{{ contactCardHover }}\">\n            <span style=\"{{ contactIconStyle }}\">✉<\u002Fspan>\n            <span><span style=\"display:block; font-family:'Space Mono',monospace; font-size:11px; color:#9aa3b2;\">General &amp; finance<\u002Fspan><span style=\"color:#fff; font-weight:600; font-size:14px; word-break:break-all;\">rspmenon@gmail.com<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n          <a href=\"mailto:aiswaryamethil@gmail.com\" style=\"{{ contactCardStyle }}\" style-hover=\"{{ contactCardHover }}\">\n            <span style=\"{{ contactIconStyle }}\">✉<\u002Fspan>\n            <span><span style=\"display:block; font-family:'Space Mono',monospace; font-size:11px; color:#9aa3b2;\">New business<\u002Fspan><span style=\"color:#fff; font-weight:600; font-size:14px; word-break:break-all;\">aiswaryamethil@gmail.com<\u002Fspan><\u002Fspan>\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"padding: 40px 48px; background: #0e1320; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: space-between;\">\n    <div style=\"font-family: 'Archivo', sans-serif; font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 1px;\">SAVAS<\u002Fdiv>\n    <p style=\"font-size: 13px; color: #8a93a3; margin: 0;\">Custom software &amp; AI, built to last — across every industry.<\u002Fp>\n    <p style=\"font-family: 'Space Mono', monospace; font-size: 12px; color: #6b7280; margin: 0;\">© {{ year }} SAVAS Solutions<\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { scheme: 'slate', headline: 5, slide: 0, scrolled: false, counts: [0, 0, 0] };\n\n  slideData() {\n    return [\n      { tag: 'PMS',     title: 'Occupancy, predicted', blurb: 'AI forecasts demand days ahead so you price every room right and never leave revenue on the table.', metric: '92.4%', sub: 'PREDICTED WEEKEND OCCUPANCY', chip: '▲ 8.1% WoW', bars: [45,62,54,78,88,70,96] },\n      { tag: 'POS',     title: 'Sales, in real time',   blurb: 'Live revenue, labor and inventory signals — surfaced the moment they matter, not in next month\\u2019s report.', metric: '\\u20B91.84L', sub: 'REVENUE TODAY', chip: '▲ 12% vs avg', bars: [50,40,66,58,82,74,90] },\n      { tag: 'CHANNEL', title: 'Rates always in sync',  blurb: 'One source of truth pushed live to every OTA. Zero overbooking, zero manual updates, zero conflicts.', metric: '9 OTAs', sub: 'CHANNELS UPDATED LIVE', chip: '0 conflicts', bars: [70,72,68,75,71,80,77] },\n      { tag: 'AGENTS',  title: 'Performance, visible',  blurb: 'Commissions, payouts and agent performance tracked automatically — full transparency, no spreadsheets.', metric: '\\u20B962K', sub: 'COMMISSIONS THIS MONTH', chip: 'Top agent +18%', bars: [38,52,60,55,72,68,84] }\n    ];\n  }\n\n  headlineList() {\n    return [\n      { l1: 'BUILT TO', l2: 'OUTSMART.' },\n      { l1: 'RUN ON', l2: 'INTELLIGENCE.' },\n      { l1: 'OPERATIONS,', l2: 'REWIRED.' },\n      { l1: 'LESS GUESSWORK.', l2: 'MORE GENIUS.' },\n      { l1: 'YOUR EDGE,', l2: 'AUTOMATED.' },\n      { l1: 'SMARTER', l2: 'BY DEFAULT.' },\n      { l1: 'STOP MANAGING.', l2: 'START KNOWING.' },\n      { l1: 'SELL MORE.', l2: 'WORK LESS.' },\n      { l1: 'STOP LOSING', l2: 'REVENUE.' },\n      { l1: 'KNOW BEFORE', l2: 'IT HAPPENS.' },\n      { l1: 'ONE PLATFORM.', l2: 'ZERO CHAOS.' },\n      { l1: 'PRICE RIGHT.', l2: 'EVERY NIGHT.' },\n      { l1: 'EVERY DECISION,', l2: 'BACKED BY AI.' }\n    ];\n  }\n\n  palette() {\n    return {\n      orange:  { name: 'Warm orange',  accent: '#d2691e', glow: 'rgba(210,105,30,0.22)' },\n      blue:    { name: 'Deep blue',    accent: '#3b82f6', glow: 'rgba(59,130,246,0.22)' },\n      teal:    { name: 'Teal',         accent: '#14b8a6', glow: 'rgba(20,184,166,0.22)' },\n      gold:    { name: 'Amber gold',   accent: '#c79a3a', glow: 'rgba(199,154,58,0.22)' },\n      emerald: { name: 'Emerald',      accent: '#10b981', glow: 'rgba(16,185,129,0.22)' },\n      plum:    { name: 'Plum',         accent: '#8b5cf6', glow: 'rgba(139,92,246,0.22)' },\n      lime:    { name: 'Electric lime',accent: '#b6e000', glow: 'rgba(182,224,0,0.20)' },\n      cyan:    { name: 'Cyan',         accent: '#06b6d4', glow: 'rgba(6,182,212,0.22)' },\n      coral:   { name: 'Coral',        accent: '#f4623a', glow: 'rgba(244,98,58,0.22)' },\n      rose:    { name: 'Rose',         accent: '#e11d6f', glow: 'rgba(225,29,111,0.22)' },\n      indigo:  { name: 'Indigo',       accent: '#6366f1', glow: 'rgba(99,102,241,0.22)' },\n      slate:   { name: 'Steel',        accent: '#64a0c8', glow: 'rgba(100,160,200,0.22)' }\n    };\n  }\n\n  rgba(hex, a) {\n    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);\n    return `rgba(${r}, ${g}, ${b}, ${a})`;\n  }\n\n  componentDidMount() {\n    this._timer = setInterval(() => {\n      this.setState(s => ({ slide: (s.slide + 1) % this.slideData().length }));\n    }, 5000);\n    this._onScroll = () => {\n      const s = window.scrollY > 24;\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n      this.checkInView();\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    setTimeout(() => { this.prepReveals(); this.setupTilt(); this.setupMagnetic(); this.checkInView(); }, 80);\n    setTimeout(() => this.checkInView(), 450);\n  }\n\n  checkInView() {\n    const vh = window.innerHeight;\n    (this._revealEls || []).forEach(el => {\n      if (el.__shown) return;\n      if (el.getBoundingClientRect().top < vh * 0.9) {\n        el.style.opacity = '1';\n        el.style.transform = 'none';\n        el.__shown = true;\n      }\n    });\n    if (!this._countersStarted) {\n      const n = document.getElementById('heroStats');\n      if (n && n.getBoundingClientRect().top < vh * 0.92) {\n        this._countersStarted = true;\n        this.runCounters();\n      }\n    }\n  }\n\n  runCounters() {\n    const targets = [4, 2, 100];\n    const dur = 1200; const t0 = performance.now();\n    const tick = (now) => {\n      const p = Math.min((now - t0) / dur, 1);\n      const eased = 1 - Math.pow(1 - p, 3);\n      this.setState({ counts: targets.map(t => Math.round(t * eased)) });\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  setupTilt() {\n    document.querySelectorAll('[data-tilt]').forEach(card => {\n      card.style.transformStyle = 'preserve-3d';\n      card.addEventListener('mouseenter', () => { card.style.transition = 'transform .12s ease-out, box-shadow .3s, border-color .3s'; });\n      card.addEventListener('mousemove', (e) => {\n        const r = card.getBoundingClientRect();\n        const px = (e.clientX - r.left) / r.width - 0.5;\n        const py = (e.clientY - r.top) / r.height - 0.5;\n        card.style.transform = `perspective(900px) rotateX(${(-py * 5).toFixed(2)}deg) rotateY(${(px * 5).toFixed(2)}deg) translateY(-6px)`;\n      });\n      card.addEventListener('mouseleave', () => {\n        card.style.transition = 'transform .4s ease, box-shadow .3s, border-color .3s';\n        card.style.transform = '';\n      });\n    });\n  }\n\n  setupMagnetic() {\n    document.querySelectorAll('[data-magnetic]').forEach(btn => {\n      btn.addEventListener('mousemove', (e) => {\n        const r = btn.getBoundingClientRect();\n        const mx = e.clientX - r.left - r.width / 2;\n        const my = e.clientY - r.top - r.height / 2;\n        btn.style.transform = `translate(${(mx * 0.25).toFixed(1)}px, ${(my * 0.35).toFixed(1)}px)`;\n      });\n      btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });\n    });\n  }\n  componentWillUnmount() {\n    clearInterval(this._timer);\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  prepReveals() {\n    this._revealEls = Array.from(document.querySelectorAll('[data-reveal]'));\n    this._revealEls.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(28px)';\n      el.style.transition = 'opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1)';\n      const d = el.getAttribute('data-delay');\n      if (d) el.style.transitionDelay = d + 'ms';\n    });\n  }\n\n  renderVals() {\n    const P = this.palette();\n    const cur = P[this.state.scheme] || P.orange;\n    const A = cur.accent;\n    const soft = this.rgba(A, 0.10);\n    const shadow = this.rgba(A, 0.32);\n\n    const schemes = Object.keys(P).map(key => {\n      const active = key === this.state.scheme;\n      return {\n        key, label: P[key].name,\n        select: () => this.setState({ scheme: key }),\n        btnStyle: `display:flex; align-items:center; gap:8px; padding:8px 14px; border:2px solid ${active ? P[key].accent : '#e0ddd6'}; background:${active ? this.rgba(P[key].accent,0.08) : '#fff'}; border-radius:8px; font-weight:600; font-size:13px; cursor:pointer; color:${active ? P[key].accent : '#5a5a5a'}; font-family:'Poppins'; transition:all .15s;`,\n        dotStyle: `width:11px; height:11px; border-radius:50%; background:${P[key].accent};`\n      };\n    });\n\n    const HL = this.headlineList();\n    const curHL = HL[this.state.headline] || HL[0];\n    const headlines = HL.map((h, i) => {\n      const active = i === this.state.headline;\n      return {\n        select: () => this.setState({ headline: i }),\n        preview: `${h.l1} ${h.l2}`,\n        btnStyle: `padding:7px 13px; border:1.5px solid ${active ? A : '#e0ddd6'}; background:${active ? soft : '#fff'}; border-radius:7px; font-weight:700; font-size:11px; letter-spacing:0.5px; cursor:pointer; color:${active ? A : '#5a5a5a'}; font-family:'Space Mono', monospace; text-transform:uppercase; transition:all .15s;`\n      };\n    });\n\n    const SL = this.slideData();\n    const n = SL.length;\n    const idx = this.state.slide % n;\n    const cur2 = SL[idx];\n    const maxBar = Math.max.apply(null, cur2.bars);\n    const carBars = cur2.bars.map(h => {\n      const hi = h === maxBar;\n      return { style: `flex:1; height:${h}%; border-radius:5px 5px 0 0; background:${hi ? A : 'rgba(255,255,255,0.10)'}; ${hi ? 'box-shadow:0 0 16px ' + this.rgba(A,0.4) + ';' : ''}` };\n    });\n    const carDots = SL.map((s, i) => ({\n      go: () => this.setState({ slide: i }),\n      style: `width:${i===idx?'26px':'9px'}; height:9px; border-radius:100px; border:none; cursor:pointer; padding:0; background:${i===idx ? A : 'rgba(255,255,255,0.22)'}; transition:all .25s;`\n    }));\n\n    return {\n      schemes,\n      headlines,\n      headlineL1: curHL.l1,\n      headlineL2: curHL.l2,\n      carTag: cur2.tag,\n      carTitle: cur2.title,\n      carBlurb: cur2.blurb,\n      carMetric: cur2.metric,\n      carSub: cur2.sub,\n      carChip: cur2.chip,\n      carBars,\n      carDots,\n      carPrev: () => this.setState(s => ({ slide: (s.slide - 1 + n) % n })),\n      carNext: () => this.setState(s => ({ slide: (s.slide + 1) % n })),\n      carGlowStyle: `position:absolute; top:-30%; left:-5%; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle, ${cur.glow} 0%, transparent 65%); pointer-events:none;`,\n      carTagStyle: `display:inline-block; font-family:'Space Mono', monospace; font-size:11px; font-weight:700; letter-spacing:1.5px; color:${A}; background:${soft}; padding:6px 13px; border-radius:100px;`,\n      carChipStyle: `font-family:'Space Mono', monospace; font-size:12px; font-weight:
